services:
  neo4j:
    image: neo4j:5-community
    container_name: aws-infra-graph-neo4j
    ports:
      - "7474:7474"  # HTTP (browser UI)
      - "7687:7687"  # Bolt (driver protocol)
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: wget -q --spider http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  mcp-server:
    build: .
    container_name: aws-infra-graph-mcp
    ports:
      - "8050:8050"
    environment:
      TRANSPORT: http
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      DEPLOY_ENV: aws
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
